<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to top, #4b1c91, #9c27b0);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 350px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background: white;
            color: #6a1b9a;
            font-weight: bold;
            margin-top: 10px;
        }

        .link {
            margin-top: 20px;
            font-size: 14px;
        }

        .link a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .error {
            color: #ffcccc;
            font-size: 13px;
            margin-top: 10px;
        }

        .success {
            color: #ccffcc;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Signup</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>

        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>
</div>

</body>
</html>
